<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCFHS ERROR RESISTANCE SIMULATOR (50 ITEMS)</title>
    <style>
        :root { --crimson: #800000; --gold: #b8860b; --dark: #0a0a0a; --gray: #1a1a1a; --text: #e0e0e0; }
        body { font-family: 'Courier New', Courier, monospace; background: var(--dark); color: var(--text); line-height: 1.6; padding: 20px; }
        .wrapper { max-width: 900px; margin: auto; border: 2px solid var(--gold); padding: 30px; background: var(--gray); }
        .warning-header { text-align: center; border-bottom: 2px solid var(--crimson); margin-bottom: 30px; padding-bottom: 10px; }
        .warning-header h1 { color: var(--crimson); letter-spacing: 3px; margin: 0; }
        .warning-header p { color: var(--gold); font-weight: bold; font-size: 0.9rem; }
        .q-card { margin-bottom: 50px; padding: 20px; border-left: 4px solid var(--gold); background: #222; }
        .vignette { color: #aaa; margin-bottom: 15px; font-style: italic; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .question { font-weight: bold; font-size: 1.1rem; color: #fff; display: block; margin-bottom: 20px; }
        .opt { display: block; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #444; cursor: pointer; transition: 0.3s; }
        .opt:hover { border-color: var(--gold); background: #1a1a1a; }
        .opt input { margin-right: 15px; accent-color: var(--gold); }
        .btn-submit { width: 100%; background: var(--crimson); color: white; padding: 20px; border: none; font-size: 1.2rem; cursor: pointer; font-weight: bold; margin-top: 30px; }
        #transcript { display: none; background: white; color: black; padding: 40px; border: 10px double black; }
        .result-row { border-bottom: 1px solid #ddd; padding: 15px 0; }
        .fail-marker { color: #d00; font-weight: bold; text-transform: uppercase; }
        .pass-marker { color: #008000; font-weight: bold; }
        .rationale { font-size: 0.85rem; background: #f0f0f0; padding: 10px; margin-top: 5px; border-left: 3px solid var(--crimson); }
        .footer-note { text-align: center; color: var(--gold); margin-top: 20px; font-size: 0.8rem; border-top: 1px dashed var(--gold); padding-top: 10px; }
    </style>
</head>
<body>

<div id="exam-view" class="wrapper">
    <div class="warning-header">
        <h1>PROMETRIC SAFETY FILTER</h1>
        <p>LEVEL 4: ERROR RESISTANCE & TRAP DETECTION</p>
    </div>

    <div style="background: #000; padding: 15px; margin-bottom: 30px; border: 1px dashed var(--gold);">
        <label style="color:var(--gold)">CANDIDATE IDENTIFICATION:</label><br>
        <input type="text" id="candidate" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--gold); color:white; font-size:1.2rem; outline:none;" placeholder="Enter Name...">
    </div>

    <div id="quiz-mount"></div>
    
    <div class="footer-note">
        *** END OF COMPETENCY ASSESSMENT ***<br>
        Ensure all 50 items are reviewed before final submission.
    </div>
    
    <button class="btn-submit" onclick="analyzePerformance()">PROCESS TRANSCRIPT</button>
</div>

<div id="transcript" class="wrapper">
    <div class="warning-header">
        <h1 style="color: #000;">PERFORMANCE TRANSCRIPT</h1>
        <p style="color: #333;">Saudi Commission for Health Specialties | Level 4 Evaluator</p>
    </div>
    <div id="meta-data" style="background: #f9f9f9; padding: 20px; border: 1px solid #000; margin-bottom: 30px; font-family: monospace;"></div>
    <div id="analysis-results"></div>
    <button class="btn-submit" style="background: #000;" onclick="window.print()">PRINT OFFICIAL RECORD</button>
    <button class="btn-submit" style="background: #444; margin-top: 10px;" onclick="location.reload()">RETAKE SIMULATION</button>
</div>

<script>
const questions = [
    { v: "A post-op patient has SOB, is pale, and using accessory muscles.", q: "Which action is priority to avoid 'Delay Trap'?", o: ["Apply O2 immediately", "12-lead ECG", "Reassess in 15 mins", "Document RR"], a: 0, r: "Act before documenting. O2 is nurse-initiated." },
    { v: "Head injury, GCS dropped from 14 to 11.", q: "What is the correct Safety Filter?", o: ["Notify Rapid Response", "Repeat GCS in 1hr", "Check pupils & document", "Review baseline"], a: 0, r: "Acute neuro change = escalate immediately." },
    { v: "4yo child climbing out of bed.", q: "Action to prevent immediate fall?", o: ["Physically assist back to bed", "Teach bed safety", "Calculate fall score", "Ask mom to watch"], a: 0, r: "Prevent fall immediately. Teaching is a Delay Trap." },
    { v: "IV antibiotic rash, wheezing, hypotension.", q: "Which Authority Trap to avoid?", o: ["Stop infusion immediately", "Call MD for order to stop", "Calculate remaining vol", "Reassure patient"], a: 0, r: "Hold unsafe meds, don't wait for orders." },
    { v: "Patient unresponsive, no pulse.", q: "First Safe Step?", o: ["Activate Emergency/CPR", "Check DNR in chart", "Document discovery time", "Wait for code team"], a: 0, r: "First safe step counts. CPR is priority." },
    { v: "DVT patient, sudden sharp chest pain.", q: "Safest nurse-initiated action?", o: ["Bed rest and O2", "Check pedal pulses", "Teach PE risks", "Wait for MD rounds"], a: 0, r: "Sudden change = act now." },
    { v: "Diabetic, tremors, glucose 45 mg/dL.", q: "Priority action?", o: ["15g rapid carbs", "Re-draw lab", "Document findings", "Explain low sugar"], a: 0, r: "Symptoms > numbers. Treat hypoglycemia now." },
    { v: "Bleeding pool under cath groin site.", q: "Action to take?", o: ["Apply direct pressure", "Get sterile kit", "Call lab for Hgb", "Incident report"], a: 0, r: "Control bleeding first. Sterility is a Complexity Trap." },
    { v: "Elderly coughing while eating.", q: "Priority safety action?", o: ["Make NPO immediately", "Give sips of water", "Teach chin-tuck", "Document cough"], a: 0, r: "Unsafe swallowing = NPO." },
    { v: "BP 80/40, HR 120.", q: "Documentation Trap to avoid?", o: ["Initiate fluid bolus", "Confirm with manual cuff", "Enter vitals into system", "Reassure family"], a: 0, r: "Hypotension = fluids first. Charting later." },
    { v: "UAP checking vitals on unstable post-op.", q: "Delegation filter?", o: ["RN reassess personally", "Let UAP finish", "Ask UAP to chart", "Praise UAP"], a: 0, r: "RN keeps safety-critical actions." },
    { v: "Fractured hip, pain 10/10, has PRN morphine.", q: "Priority action?", o: ["Administer morphine now", "Take 10min history", "Wait for 2nd opinion", "Document & recheck"], a: 0, r: "Treat pain if no contraindication." },
    { v: "Fire in trash can in room.", q: "First step?", o: ["Remove patient", "Call fire dept", "Extinguish fire", "Document location"], a: 0, r: "RACE: Rescue first." },
    { v: "Floated to unit, new with chest tubes.", q: "Safety action?", o: ["Supervised performance", "Refuse and leave", "Watch YouTube", "Document fear"], a: 0, r: "Supervision ensures safety." },
    { v: "Suspected meningitis, needs precautions.", q: "Priority?", o: ["Assess airway/vitals", "Gown/Mask first", "Read policy", "Document vaccines"], a: 0, r: "Address stability (ABCs) first." },
    { v: "Wound eviscerated.", q: "Action priority?", o: ["Saline gauze & help", "Explain to family", "Wait for resident", "Document size"], a: 0, r: "Act before explaining." },
    { v: "Potassium 6.8, on monitor.", q: "Action to take?", o: ["Check for peaked T-waves", "Repeat lab", "Explain diet", "Document value"], a: 0, r: "Heart > Labels. Check ECG risk." },
    { v: "Family refuses blood for bleeding patient.", q: "Safety filter?", o: ["Notify MD/Document", "Give blood anyway", "Argue with family", "Avoid room"], a: 0, r: "Documentation/Reporting is the legal safety path." },
    { v: "SBAR report for low urine output.", q: "Avoid Over-reporting?", o: ["Brief facts/Action request", "Read full history", "Wait for MD lunch", "Suggest diagnoses"], a: 0, r: "Keep reports concise and action-oriented." },
    { v: "Medication dose is double normal.", q: "Authority Trap to ignore?", o: ["Hold and clarify", "Give because MD said so", "Wait for pharmacy", "Document & give"], a: 0, r: "Hold unsafe meds." },
    // --- Items 21-50 Added Below ---
    { v: "Post-thyroidectomy, stridor heard.", q: "Airway filter?", o: ["Emergency Trach prep", "Check Calcium", "Document sound", "Reassure swelling"], a: 0, r: "Airway before diagnosis." },
    { v: "Tetralogy of Fallot blue spell.", q: "Simples action?", o: ["Knee-chest position", "Calculate SpO2", "Call Cardiology", "Explain pathophysiology"], a: 0, r: "Choose simplest safe action." },
    { v: "Potassium IV ordered, patient is anuric.", q: "Safety filter?", o: ["Hold infusion", "Give as ordered", "Chart and slow rate", "Check Temp"], a: 0, r: "Hold unsafe meds in anuria." },
    { v: "Chest tube gurgling at site.", q: "Fast win?", o: ["Tape 3 sides gauze", "Wait for Wound nurse", "Document drainage", "Ask to cough"], a: 0, r: "Prevent air entry immediately." },
    { v: "Confused patient pulling IV line.", q: "Action priority?", o: ["Secure line/Reorient", "Chart confusion", "Call family", "Read history"], a: 0, r: "Act before documenting." },
    { v: "Acute MI, pain 8/10.", q: "Safety filter?", o: ["Nitroglycerin now", "ECG and wait", "Detailed pain description", "BP every 2 mins"], a: 0, r: "Chest pain = basic intervention." },
    { v: "Psych patient throwing chairs.", q: "Safety > Comfort?", o: ["Evacuate others/Help", "Therapeutic talk", "Document words", "Give snack"], a: 0, r: "Safety > Comfort in violence." },
    { v: "Distended bladder, pelvic fracture.", q: "Scope of practice?", o: ["Bladder scan/Report", "Wait for MD exam", "Document retention", "Explain UTI"], a: 0, r: "Nurse-initiated safety allowed." },
    { v: "Colleague using dirty needle.", q: "Ethical filter?", o: ["Stop colleague now", "Report tomorrow", "Watch for infection", "Reassure colleague"], a: 0, r: "Safety overrides debate." },
    { v: "Head injury, child vomiting.", q: "Safety priority?", o: ["Side-lying position", "Explain ICP", "Wait for CT", "Document volume"], a: 0, r: "Positioning prevents aspiration." },
    { v: "Staff bypassing med scanners.", q: "Leadership filter?", o: ["Investigate system", "Warn staff", "Fire nurse", "Reassure staff"], a: 0, r: "Address the system (why)." },
    { v: "Heparin drip, large bruise.", q: "Delay trap?", o: ["Stop Heparin now", "Reassess in 2hrs", "STAT aPTT/Wait", "Document bruise"], a: 0, r: "Hold unsafe meds immediately." },
    { v: "Code Blue, tasked with charting.", q: "Time filter?", o: ["Real-time drug logs", "Chart from memory later", "Chart family presence", "Explain to neighbor"], a: 0, r: "Fast + Conservative wins." },
    { v: "TB isolation, visitor no mask.", q: "Safety filter?", o: ["Firmly require N95", "Allow entry", "Document refusal", "Give surgical mask"], a: 0, r: "Safety > Politeness." },
    { v: "Trach decannulation.", q: "First safe step?", o: ["BVM or spare tube", "Call surgeon", "Document incident", "Wait for RT"], a: 0, r: "First safe step is airway." },
    { v: "Renal patient, SOB, BP 190/110.", q: "Symptoms filter?", o: ["Elevate HOB/Assess", "Wait for Dietitian", "Document weight", "Calculate Intake"], a: 0, r: "Symptoms > Numbers." },
    { v: "Abdominal 'pop' during dressing.", q: "Action rule?", o: ["Sterile moist gauze", "Document 'pop'", "Explain dehiscence", "Wait for MD"], a: 0, r: "Protect wound before charting." },
    { v: "Psych: 'I feel like ending it'.", q: "Safety filter?", o: ["1:1 Observation", "Document log", "Wait for psych", "Reassure"], a: 0, r: "Acute psych change = escalate." },
    { v: "SpO2 82% room air.", q: "Nurse-initiated?", o: ["Apply 2L O2 then call", "Wait for order", "Document & recheck", "Full physical exam"], a: 0, r: "O2 is nurse-initiated safety." },
    { v: "Arterial line disconnected/Bleeding.", q: "Priority?", o: ["Direct pressure", "Call tech", "Document loss", "Wait for ICU RN"], a: 0, r: "Control bleeding first." },
    { v: "Central line, sharp pain, murmur.", q: "Diagnosis trap?", o: ["Trendelenburg Left", "Wait for X-ray", "Document sounds", "Reassure"], a: 0, r: "Treat suspected air emboli now." },
    { v: "Post-op BP 70/40 reported by UAP.", q: "Action rule?", o: ["Assess/Start fluids", "Tell UAP to chart", "Wait for 2hr check", "Document/Call diet"], a: 0, r: "Abnormal + unstable = intervene." },
    { v: "ED screaming, open fracture.", q: "Safety > Politeness?", o: ["Stabilize/Dress wound", "Ask to be quiet", "Explain noise policy", "Document behavior"], a: 0, r: "Safety > Comfort." },
    { v: "High-alert med, scanner broken.", q: "Time rule?", o: ["Manual double check", "Bypass/Chart later", "Wait for IT", "Ask patient"], a: 0, r: "Fast + Conservative = Double check." },
    { v: "Cast, toes numb/immobile.", q: "Action priority?", o: ["Notify Surgeon", "Explain normality", "Wait for next check", "Document/Elevate"], a: 0, r: "Acute neuro change = escalate." },
    { v: "Near-miss reporting fear.", q: "Leadership filter?", o: ["Non-punitive culture", "Post shame list", "Wait for survey", "Document non-compliance"], a: 0, r: "Address system fear." },
    { v: "Child choking on toy, not breathing.", q: "Safety priority?", o: ["Airway maneuvers", "Call parents", "Document color", "Wait for team"], a: 0, r: "Airway before diagnosis." },
    { v: "GI bleed, becoming lethargic.", q: "Fluid filter?", o: ["Ensure IV/Prepare bolus", "Calculate 12hr out", "Wait for Scope", "Document lethargy"], a: 0, r: "Bleeding = fluids first." },
    { v: "Floating, unknown medication.", q: "Scope trap?", o: ["Drug guide/Verify", "Give anyway", "Refuse all meds", "Document lack of knowledge"], a: 0, r: "Hold and Verify." },
    { v: "Allergic reaction to skin prep.", q: "Universal filter?", o: ["Wash skin/Protocol", "Wait for surgeon", "Document edges", "Explain allergy"], a: 0, r: "Remove trigger immediately." }
];

function init() {
    const mount = document.getElementById('quiz-mount');
    questions.forEach((q, index) => {
        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <div class="vignette">${q.v}</div>
            <span class="question">${index + 1}. ${q.q}</span>
            ${q.o.map((opt, i) => `<label class="opt"><input type="radio" name="q${index}" value="${i}"> ${opt}</label>`).join('')}
        `;
        mount.appendChild(div);
    });
}

function analyzePerformance() {
    const nameInput = document.getElementById('candidate').value;
    if(!nameInput) {
        alert("CRITICAL ERROR: Candidate Name is required.");
        return;
    }

    let rawScore = 0;
    const totalItems = questions.length;
    const reviewArea = document.getElementById('analysis-results');
    reviewArea.innerHTML = '<h3 style="border-bottom: 2px solid #000;">CLINICAL RATIONALE REVIEW</h3>';

    questions.forEach((q, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const isCorrect = selected && parseInt(selected.value) === q.a;
        if(isCorrect) rawScore++;

        const row = document.createElement('div');
        row.className = 'result-row';
        row.innerHTML = `
            <p><strong>Item ${index + 1}:</strong> Status: <span class="${isCorrect ? 'pass-marker' : 'fail-marker'}">${isCorrect ? 'SAFE' : 'UNSAFE'}</span></p>
            <p>Correct: ${q.o[q.a]}</p>
            <div class="rationale"><strong>Rationale:</strong> ${q.r}</div>
        `;
        reviewArea.appendChild(row);
    });

    const percentage = Math.round((rawScore / totalItems) * 100);
    const passingScore = 80;
    const isPassed = percentage >= passingScore;

    document.getElementById('exam-view').style.display = 'none';
    document.getElementById('transcript').style.display = 'block';
    
    document.getElementById('meta-data').innerHTML = `
        <p><strong>CANDIDATE:</strong> ${nameInput.toUpperCase()}</p>
        <p><strong>SCORE:</strong> ${rawScore} / ${totalItems} (${percentage}%)</p>
        <p><strong>STATUS:</strong> <span class="${isPassed ? 'pass-marker' : 'fail-marker'}">${isPassed ? 'PASSED' : 'FAILED'}</span></p>
    `;
    window.scrollTo(0,0);
}

window.onload = init;
</script>
</body>
</html>
